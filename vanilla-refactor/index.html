<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/index.css" />
    <script
      src="https://kit.fontawesome.com/3bfd3ce9e5.js"
      crossorigin="anonymous"
    ></script>
    <title>Vanilla JS T3</title>
  </head>
  <body>
    <main>
      <div class="grid">
        <!-- turn indicator -->
        <div class="turn yellow" data-id="turn">
          <i class="fa-solid fa-xmark"></i>
          <p>Player 1, you're up!</p>
        </div>

        <!-- drop-down menu -->
        <div class="menu" data-id="menu">
          <button class="menu-btn" id="menu-btn">
            Actions
            <i class="fa-solid fa-chevron-down"></i>
          </button>

          <div class="items border hidden" data-id="menu-items">
            <button data-id="resetBtn">Reset</button>
            <button data-id="newRoundBtn">New Round</button>
          </div>
        </div>

        <!--game board-->
        <div id="1" class="tile shadow" data-id="square"></div>
        <div id="2" class="tile shadow" data-id="square"></div>
        <div id="3" class="tile shadow" data-id="square"></div>
        <div id="4" class="tile shadow" data-id="square"></div>
        <div id="5" class="tile shadow" data-id="square"></div>
        <div id="6" class="tile shadow" data-id="square"></div>
        <div id="7" class="tile shadow" data-id="square"></div>
        <div id="8" class="tile shadow" data-id="square"></div>
        <div id="9" class="tile shadow" data-id="square"></div>

        <!--score board-->
        <div class="score shadow" style="background-color: var(--yellow)">
          <p>Player 1</p>
          <span data-id="p1-wins">0 Wins</span>
        </div>
        <div class="score shadow" style="background-color: var(--light-gray)">
          <p>Ties</p>
          <span data-id="ties">0</span>
        </div>
        <div class="score shadow" style="background-color: var(--turquoise)">
          <p>Player 2</p>
          <span data-id="p2-wins">0 Wins</span>
        </div>
      </div>
    </main>

    <footer>
      <p>         tic-tac-toe by
        <a href="https://www.linkedin.com/in/mayuri-garge-mn2117/"
          >mayuriGarge</a
        >
      </p>
    </footer>

    <!-- Modal that opens when game ends -->
    <div class="modal hidden" data-id="modal">
      <div class="modal-contents" data-id="modal-contents">
        <p data-id="modal-text"></p>
        <button data-id="modal-btn">Play again</button>
      </div>
    </div>

    <script src="js/app.js" type="module"></script>
  </body>
</html>
